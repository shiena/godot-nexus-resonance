name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  changes:
    name: Check changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.result.outputs.src }}
      run_gut: ${{ steps.result.outputs.run_gut }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'audio_resonance_tool/addons/nexus_resonance/**'
              - 'SConstruct'
            gd:
              - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
              - 'audio_resonance_tool/test/**/*.gd'

      - id: result
        run: |
          echo "src=${{ steps.filter.outputs.src }}" >> $GITHUB_OUTPUT
          if [ "${{ steps.filter.outputs.src }}" = "true" ] || [ "${{ steps.filter.outputs.gd }}" = "true" ]; then
            echo "run_gut=true" >> $GITHUB_OUTPUT
          else
            echo "run_gut=false" >> $GITHUB_OUTPUT
          fi

  cpp-build-test-linux:
    name: C++ Build & Unit Tests (Linux)
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache Steam Audio SDK
        uses: actions/cache@v5
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        run: bash .github/scripts/install_steam_audio_ci.sh

      - name: Add GCC problem matcher
        run: echo "::add-matcher::${{ github.workspace }}/.github/gcc-problem-matcher.json"

      - name: Cache SCons build
        uses: actions/cache@v5
        with:
          path: .scons-cache
          key: scons-tests-Linux-v3-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct', 'src/register_types.cpp', 'src/resonance_server.cpp', 'src/test/test_main.cpp', 'src/test/test_ipl_guard.cpp') }}
          restore-keys: |
            scons-tests-Linux-

      - name: Install SCons
        run: pip install scons

      - name: Clang-format check
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find src -type f \( -name "*.cpp" -o -name "*.h" \) ! -path "*/lib/*" ! -path "*/gen/*" | xargs clang-format -i
          echo "--- Diff (clang-format expected changes) ---"
          git diff
          git diff --exit-code || exit 1

      - name: Build C++ extension and tests
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons platform=linux target=editor build_tests=1 compiledb=1 -j$(nproc)

      - name: Run C++ unit tests
        run: ./build/tests/nexus_resonance_tests

      - name: Clang-Tidy (static analysis)
        run: |
          sudo apt-get install -y clang-tidy
          if [ -f compile_commands.json ]; then
            find src -type f \( -name "*.cpp" -o -name "*.h" \) ! -path "*/lib/*" ! -path "*/gen/*" | head -80 | xargs -r clang-tidy -p . -checks='-*,bugprone-*,cert-*,clang-analyzer-*' --warnings-as-errors=* 2>/dev/null || true
          fi

      - name: Upload bin artifact
        uses: actions/upload-artifact@v5
        with:
          name: nexus_resonance-bin-linux
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  cpp-build-test-windows:
    name: C++ Build & Unit Tests (Windows)
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache Steam Audio SDK
        uses: actions/cache@v5
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        env:
          PYTHON: python
        run: bash .github/scripts/install_steam_audio_ci.sh

      - name: Cache SCons build
        uses: actions/cache@v5
        with:
          path: .scons-cache
          key: scons-tests-Windows-v2-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct', 'src/register_types.cpp', 'src/resonance_server.cpp', 'src/test/test_main.cpp') }}
          restore-keys: |
            scons-tests-Windows-

      - name: Install SCons
        run: pip install scons

      - name: Build C++ extension and tests
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons platform=windows target=editor build_tests=1 -j${NUMBER_OF_PROCESSORS:-4}

      - name: Run C++ unit tests
        run: ./build/tests/nexus_resonance_tests.exe

  gut:
    name: GDScript Unit Tests
    needs: [changes, cpp-build-test-linux]
    if: needs.changes.outputs.run_gut == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download bin artifact
        uses: actions/download-artifact@v5
        with:
          name: nexus_resonance-bin-linux
          path: audio_resonance_tool/addons/nexus_resonance/bin

      - name: Install GUT test framework
        run: |
          GUT_VERSION="9.6.0"
          curl -fsSL -o /tmp/gut.zip "https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.zip"
          unzip -qo /tmp/gut.zip -d /tmp/gut
          mkdir -p audio_resonance_tool/addons/gut
          cp -r /tmp/gut/Gut-${GUT_VERSION}/addons/gut/* audio_resonance_tool/addons/gut/
          rm -rf /tmp/gut /tmp/gut.zip

      - name: Setup Godot 4.6
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.0"
          use-dotnet: false

      - name: Import project
        run: godot --headless --path audio_resonance_tool --import
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run GUT tests
        run: godot --headless -d --audio-driver Dummy --path audio_resonance_tool -s addons/gut/gut_cmdln.gd -gdir=res://test/unit -gexit
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1
