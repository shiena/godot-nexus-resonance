name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows MSVC)
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure submodules (fallback if checkout missed them)
        run: |
          if [ ! -f src/lib/godot-cpp/SConstruct ]; then
            mkdir -p src/lib
            git clone -b 4.5 --depth 1 https://github.com/godotengine/godot-cpp src/lib/godot-cpp
          fi

      - name: Install Steam Audio SDK
        run: python scripts/install_steam_audio.py

      - name: Cache SCons build
        uses: actions/cache@v5
        with:
          path: .scons-cache
          key: scons-Windows-windows-v3-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'src/lib/godot-cpp/gdextension/extension_api.json', 'SConstruct', 'src/register_types.cpp', 'src/resonance_server.cpp') }}
          restore-keys: |
            scons-Windows-windows-

      - name: Install Python & SCons
        run: |
          python -m pip install scons
          scons --version

      - name: Create bin directory
        run: mkdir -p audio_resonance_tool/addons/nexus_resonance/bin

      - name: Build GDExtension
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons platform=windows target=template_debug arch=x86_64 build_tests=0 -j${NUMBER_OF_PROCESSORS:-4}

      - name: Copy Steam Audio runtime DLLs to bin
        run: |
          STEAM_LIB="src/lib/steamaudio/lib/windows-x64"
          BIN_DIR="audio_resonance_tool/addons/nexus_resonance/bin"
          for dll in phonon.dll GPUUtilities.dll TrueAudioNext.dll; do
            if [ -f "$STEAM_LIB/$dll" ]; then
              cp "$STEAM_LIB/$dll" "$BIN_DIR/"
            fi
          done

      - name: Prepare release artifact (addons/nexus_resonance with bin)
        run: |
          mkdir -p release_addon/addons/nexus_resonance
          cp -r audio_resonance_tool/addons/nexus_resonance/* release_addon/addons/nexus_resonance/
          cp LICENSE release_addon/addons/nexus_resonance/

      - name: Verify bin/nexus_resonance.dll exists (debug)
        run: |
          BIN_DLL="release_addon/addons/nexus_resonance/bin/nexus_resonance.dll"
          if [ -f "$BIN_DLL" ]; then
            echo "OK: nexus_resonance.dll found"
            ls -la release_addon/addons/nexus_resonance/bin/
          else
            echo "ERROR: nexus_resonance.dll MISSING"
            find release_addon -type f
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: nexus_resonance-addon
          path: release_addon

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: nexus_resonance-addon

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create addon zip
        run: |
          mkdir -p release_packages
          zip -r release_packages/nexus_resonance-windows-v${{ steps.version.outputs.version }}.zip addons

      - name: Verify zip contains bin/nexus_resonance.dll (debug)
        run: |
          ZIP="release_packages/nexus_resonance-windows-v${{ steps.version.outputs.version }}.zip"
          if unzip -l "$ZIP" | grep -q "addons/nexus_resonance/bin/nexus_resonance.dll"; then
            echo "OK: nexus_resonance.dll in zip"
            unzip -l "$ZIP" | head -50
          else
            echo "ERROR: nexus_resonance.dll NOT in zip"
            unzip -l "$ZIP"
            exit 1
          fi

      - name: Prepare release body
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CHANGELOG_SECTION=$(VERSION="$VERSION" CHANGELOG_PATH="docs/CHANGELOG.md" python3 .github/scripts/extract_changelog.py)
          {
            echo "$CHANGELOG_SECTION"
            echo ""
            echo "## Installation"
            echo ""
            echo "**nexus_resonance-windows-v${VERSION}.zip** – Addon with Windows binaries. Extract into your Godot project's \`addons/\` folder."
            echo ""
            echo "macOS/Linux: Clone the repo and build locally with \`scons platform=<os> target=template_debug\`."
            echo ""
            echo "See [README](https://github.com/${{ github.repository }}) for requirements and usage."
          } > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release_body.md
          files: release_packages/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
