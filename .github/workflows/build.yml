name: Build GDExtension

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Check changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.result.outputs.src }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            src:
              - 'src/**'
              - 'audio_resonance_tool/addons/nexus_resonance/**'

      - id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "src=true" >> $GITHUB_OUTPUT
          else
            echo "src=${{ steps.filter.outputs.src }}" >> $GITHUB_OUTPUT
          fi

  build-linux-android:
    name: Linux / Android
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.src == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r23c
          add-to-path: true
          link-to-sdk: true

      - name: Set ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python3 -m pip install scons
          scons --version

      - name: Cache Steam Audio SDK
        uses: actions/cache@v4
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        run: bash .github/scripts/install_steam_audio_ci.sh

      - name: Add GCC problem matcher
        run: echo "::add-matcher::${{ github.workspace }}/.github/gcc-problem-matcher.json"

      - name: Cache SCons build
        uses: actions/cache@v5
        with:
          path: .scons-cache
          key: scons-Linux-all-v1-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct') }}
          restore-keys: |
            scons-Linux-all-

      - name: Create bin directories
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          mkdir -p "$BIN"/{linux,android/arm64-v8a,android/x86_64}

      - name: Copy Steam Audio runtime libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          cp src/lib/steamaudio/lib/linux-x64/libphonon.so "$BIN/linux/"
          cp src/lib/steamaudio/lib/android-armv8/libphonon.so "$BIN/android/arm64-v8a/"
          cp src/lib/steamaudio/lib/android-x64/libphonon.so "$BIN/android/x86_64/"

      - name: Build Linux
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=linux target=template_debug build_tests=0 -j$(nproc)
          scons platform=linux target=template_release build_tests=0 -j$(nproc)

      - name: Build Android (arm64)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=android arch=arm64 target=template_debug build_tests=0 ndk_version=23.2.8568313 -j$(nproc)
          scons platform=android arch=arm64 target=template_release build_tests=0 ndk_version=23.2.8568313 -j$(nproc)

      - name: Build Android (x86_64)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=android arch=x86_64 target=template_debug build_tests=0 ndk_version=23.2.8568313 -j$(nproc)
          scons platform=android arch=x86_64 target=template_release build_tests=0 ndk_version=23.2.8568313 -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-linux-android
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  build-windows:
    name: Windows (MSVC)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.src == 'true'
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          python -m pip install scons
          scons --version

      - name: Cache Steam Audio SDK
        uses: actions/cache@v4
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        env:
          PYTHON: python
        run: bash .github/scripts/install_steam_audio_ci.sh

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-Windows-all-v1-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct') }}
          restore-keys: |
            scons-Windows-all-

      - name: Create bin directories
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          mkdir -p "$BIN"/windows

      - name: Copy Steam Audio runtime libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          cp src/lib/steamaudio/lib/windows-x64/phonon.dll "$BIN/windows/"
          for dll in GPUUtilities.dll TrueAudioNext.dll; do
            [ -f "src/lib/steamaudio/lib/windows-x64/$dll" ] && cp "src/lib/steamaudio/lib/windows-x64/$dll" "$BIN/windows/"
          done

      - name: Build Windows
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=windows target=template_debug build_tests=0 -j${NUMBER_OF_PROCESSORS:-4}
          scons platform=windows target=template_release build_tests=0 -j${NUMBER_OF_PROCESSORS:-4}

      - name: Remove MSVC build artifacts
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin/windows
          rm -f "$BIN"/*.exp "$BIN"/*.lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-windows
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  build-macos-ios:
    name: macOS / iOS
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.src == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          PIP_BREAK_SYSTEM_PACKAGES=1 python3 -m pip install scons
          scons --version

      - name: Cache Steam Audio SDK
        uses: actions/cache@v4
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        run: bash .github/scripts/install_steam_audio_ci.sh

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-macOS-all-v1-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct') }}
          restore-keys: |
            scons-macOS-all-

      - name: Create bin directories
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          mkdir -p "$BIN"/{macos,ios}

      - name: Copy Steam Audio runtime libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          cp src/lib/steamaudio/lib/osx/libphonon.dylib "$BIN/macos/"
          cp src/lib/steamaudio/lib/ios/libphonon.a "$BIN/ios/"

      - name: Build iOS dependencies
        run: make ios-deps

      - name: Build macOS
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=macos target=template_debug build_tests=0 -j$(sysctl -n hw.logicalcpu)
          scons platform=macos target=template_release build_tests=0 -j$(sysctl -n hw.logicalcpu)

      - name: Build iOS
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=ios arch=arm64 target=template_debug build_tests=0 -j$(sysctl -n hw.logicalcpu)
          scons platform=ios arch=arm64 target=template_release build_tests=0 -j$(sysctl -n hw.logicalcpu)

      - name: Copy iOS static libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin/ios
          cp src/lib/godot-cpp/bin/libgodot-cpp.ios.template_debug.arm64.a "$BIN/"
          cp src/lib/godot-cpp/bin/libgodot-cpp.ios.template_release.arm64.a "$BIN/"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: bin-macos-ios
          path: audio_resonance_tool/addons/nexus_resonance/bin/
