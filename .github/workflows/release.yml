name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.ref }}

      - name: Ensure submodules (fallback)
        run: |
          if [ ! -f src/lib/godot-cpp/SConstruct ]; then
            mkdir -p src/lib
            git clone -b 4.5 --depth 1 https://github.com/godotengine/godot-cpp src/lib/godot-cpp
          fi
          if [ ! -f src/lib/catch2/catch.hpp ]; then
            git clone -b v2.x --depth 1 https://github.com/catchorg/Catch2 /tmp/Catch2
            mkdir -p src/lib/catch2
            cp /tmp/Catch2/single_include/catch2/catch.hpp src/lib/catch2/
          fi

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release archive (full project with submodules)
        run: |
          mkdir -p release_packages
          zip -r release_packages/nexus_resonance-windows-v${{ steps.version.outputs.version }}.zip . \
            -x ".git/*" -x ".scons-cache/*" -x "build/*" \
            -x "audio_resonance_tool/.godot/*" -x "src/lib/steamaudio/*" \
            -x "audio_resonance_tool/addons/nexus_resonance/bin/*" -x "*.pyc"

      - name: Prepare release body
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CHANGELOG_SECTION=$(VERSION="$VERSION" CHANGELOG_PATH="docs/CHANGELOG.md" python3 .github/scripts/extract_changelog.py)
          {
            echo "$CHANGELOG_SECTION"
            echo ""
            echo "## Installation"
            echo ""
            echo "**nexus_resonance-windows-v${VERSION}.zip** – Full project including godot-cpp and Catch2. After extracting: run \`python scripts/install_steam_audio.py\`, then \`scons platform=windows target=editor\`."
            echo ""
            echo "macOS/Linux: Clone the repo and build locally with \`scons platform=<os> target=editor\`."
            echo ""
            echo "See [README](https://github.com/${{ github.repository }}) for requirements and usage."
          } > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release_body.md
          files: release_packages/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
