name: CodeQL

# Disabled for now (takes ~1h). Re-enable by restoring push/pull_request/schedule triggers.
on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Create bin directory
        run: mkdir -p audio_resonance_tool/addons/nexus_resonance/bin

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: +security-and-quality
          paths-ignore: |
            src/lib/**
            core/**

      - name: Build
        run: |
          pip install scons
          scons build_tests=1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
