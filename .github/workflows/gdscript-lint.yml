name: GDScript Lint

on:
  push:
    branches: [main, master]
    paths:
      - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
      - 'audio_resonance_tool/test/**/*.gd'
  pull_request:
    branches: [main, master]
    paths:
      - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
      - 'audio_resonance_tool/test/**/*.gd'

jobs:
  lint:
    name: GDScript format & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audio_resonance_tool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GDScript Toolkit
        uses: Scony/godot-gdscript-toolkit@4.5.0

      - name: Check GDScript format
        run: gdformat --check addons/nexus_resonance/ test/
        continue-on-error: true

      - name: Lint GDScript
        run: gdlint addons/nexus_resonance/ test/ 2>/dev/null || true
        continue-on-error: true
