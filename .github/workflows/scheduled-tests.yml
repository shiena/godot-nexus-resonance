name: Scheduled Godot Tests

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  godot-matrix:
    name: GUT on Godot ${{ matrix.godot_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot_version:
          - "4.6"
          - "4.3"

    defaults:
      run:
        working-directory: audio_resonance_tool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot ${{ matrix.godot_version }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ matrix.godot_version }}
          use-dotnet: false

      - name: Import project
        run: godot --headless --path . --import
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run GUT tests
        run: godot --headless -d --audio-driver Dummy -s addons/gut/gut_cmdln.gd -gdir=res://test/unit -gexit
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1
