name: CodeQL

# Disabled for now (takes ~1h). Re-enable by restoring push/pull_request/schedule triggers.
on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure submodules (fallback if checkout missed them)
        run: |
          if [ ! -f src/lib/godot-cpp/SConstruct ]; then
            mkdir -p src/lib
            git clone -b 4.5 --depth 1 https://github.com/godotengine/godot-cpp src/lib/godot-cpp
          fi
          if [ ! -f src/lib/catch2/catch.hpp ]; then
            git clone -b v2.x --depth 1 https://github.com/catchorg/Catch2 /tmp/Catch2
            mkdir -p src/lib/catch2
            cp /tmp/Catch2/single_include/catch2/catch.hpp src/lib/catch2/
          fi

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Create bin directory
        run: mkdir -p audio_resonance_tool/addons/nexus_resonance/bin

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: +security-and-quality

      - name: Build
        run: |
          pip install scons
          scons build_tests=1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
