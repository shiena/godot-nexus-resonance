name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  changes:
    name: Check changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.result.outputs.src }}
      run_gut: ${{ steps.result.outputs.run_gut }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'audio_resonance_tool/addons/nexus_resonance/**'
            gd:
              - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
              - 'audio_resonance_tool/test/**/*.gd'

      - id: result
        run: |
          echo "src=${{ steps.filter.outputs.src }}" >> $GITHUB_OUTPUT
          if [ "${{ steps.filter.outputs.src }}" = "true" ] || [ "${{ steps.filter.outputs.gd }}" = "true" ]; then
            echo "run_gut=true" >> $GITHUB_OUTPUT
          else
            echo "run_gut=false" >> $GITHUB_OUTPUT
          fi

  cpp-build-test:
    name: C++ Build & Unit Tests (Windows)
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Add GCC problem matcher
        run: echo "::add-matcher::${{ github.workspace }}/.github/gcc-problem-matcher.json"

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-tests-Linux-v2-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct', 'src/register_types.cpp', 'src/resonance_server.cpp', 'src/test/test_main.cpp') }}
          restore-keys: |
            scons-tests-Linux-

      - name: Install SCons
        run: pip install scons

      - name: Create bin directory
        run: mkdir -p audio_resonance_tool/addons/nexus_resonance/bin/linux

      - name: Copy Steam Audio runtime libraries
        run: cp src/lib/steamaudio/lib/linux-x64/libphonon.so audio_resonance_tool/addons/nexus_resonance/bin/linux/

      - name: Clang-format check (optional)
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find src -type f \( -name "*.cpp" -o -name "*.h" \) ! -path "*/lib/*" | xargs clang-format --dry-run -Werror 2>/dev/null || true

      - name: Build C++ extension and tests
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons platform=linux target=editor build_tests=1 -j$(nproc)

      - name: Run C++ unit tests
        run: ./build/tests/nexus_resonance_tests

      - name: Upload bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus_resonance-bin-linux
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  gut:
    name: GDScript Unit Tests
    needs: [changes, cpp-build-test]
    if: needs.changes.outputs.run_gut == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bin artifact
        uses: actions/download-artifact@v4
        with:
          name: nexus_resonance-bin-linux
          path: audio_resonance_tool/addons/nexus_resonance/bin

      - name: Setup Godot 4.6
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.0"
          use-dotnet: false

      - name: Import project
        run: godot --headless --path audio_resonance_tool --import
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run GUT tests
        run: godot --headless -d --audio-driver Dummy --path audio_resonance_tool -s addons/gut/gut_cmdln.gd -gdir=res://test/unit -gexit
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1
