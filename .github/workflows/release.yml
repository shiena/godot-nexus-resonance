name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux-android:
    name: Build (Linux / Android)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r23c
          add-to-path: true
          link-to-sdk: true

      - name: Set ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python3 -m pip install scons
          scons --version

      - name: Cache Steam Audio SDK
        uses: actions/cache@v4
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Add GCC problem matcher
        run: echo "::add-matcher::${{ github.workspace }}/.github/gcc-problem-matcher.json"

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-Linux-all-v1-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct') }}
          restore-keys: |
            scons-Linux-all-

      - name: Create bin directories
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          mkdir -p "$BIN"/{linux,android/arm64-v8a,android/x86_64}

      - name: Copy Steam Audio runtime libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          cp src/lib/steamaudio/lib/linux-x64/libphonon.so "$BIN/linux/"
          cp src/lib/steamaudio/lib/android-armv8/libphonon.so "$BIN/android/arm64-v8a/"
          cp src/lib/steamaudio/lib/android-x64/libphonon.so "$BIN/android/x86_64/"

      - name: Build Linux
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=linux target=template_debug build_tests=0 -j$(nproc)
          scons platform=linux target=template_release build_tests=0 -j$(nproc)

      - name: Build Android (arm64)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=android arch=arm64 target=template_debug build_tests=0 ndk_version=23.2.8568313 -j$(nproc)
          scons platform=android arch=arm64 target=template_release build_tests=0 ndk_version=23.2.8568313 -j$(nproc)

      - name: Build Android (x86_64)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=android arch=x86_64 target=template_debug build_tests=0 ndk_version=23.2.8568313 -j$(nproc)
          scons platform=android arch=x86_64 target=template_release build_tests=0 ndk_version=23.2.8568313 -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-linux-android
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  build-windows:
    name: Build (Windows MSVC)
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          python -m pip install scons
          scons --version

      - name: Cache Steam Audio SDK
        uses: actions/cache@v4
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        run: python scripts/install_steam_audio.py

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-Windows-all-v1-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct') }}
          restore-keys: |
            scons-Windows-all-

      - name: Create bin directories
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          mkdir -p "$BIN"/windows

      - name: Copy Steam Audio runtime libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          cp src/lib/steamaudio/lib/windows-x64/phonon.dll "$BIN/windows/"
          for dll in GPUUtilities.dll TrueAudioNext.dll; do
            [ -f "src/lib/steamaudio/lib/windows-x64/$dll" ] && cp "src/lib/steamaudio/lib/windows-x64/$dll" "$BIN/windows/"
          done

      - name: Build Windows
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=windows target=template_debug build_tests=0 -j${NUMBER_OF_PROCESSORS:-4}
          scons platform=windows target=template_release build_tests=0 -j${NUMBER_OF_PROCESSORS:-4}

      - name: Remove MSVC build artifacts
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin/windows
          rm -f "$BIN"/*.exp "$BIN"/*.lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-windows
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  build-macos-ios:
    name: Build (macOS / iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          PIP_BREAK_SYSTEM_PACKAGES=1 python3 -m pip install scons
          scons --version

      - name: Cache Steam Audio SDK
        uses: actions/cache@v4
        with:
          path: src/lib/steamaudio
          key: steamaudio-${{ hashFiles('scripts/install_steam_audio.py') }}

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Cache SCons build
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-macOS-all-v1-${{ hashFiles('src/lib/godot-cpp/SConstruct', 'SConstruct') }}
          restore-keys: |
            scons-macOS-all-

      - name: Create bin directories
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          mkdir -p "$BIN"/{macos,ios}

      - name: Copy Steam Audio runtime libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin
          cp src/lib/steamaudio/lib/osx/libphonon.dylib "$BIN/macos/"
          cp src/lib/steamaudio/lib/ios/libphonon.a "$BIN/ios/"

      - name: Build iOS dependencies
        run: make ios-deps

      - name: Build macOS
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=macos target=template_debug build_tests=0 -j$(sysctl -n hw.logicalcpu)
          scons platform=macos target=template_release build_tests=0 -j$(sysctl -n hw.logicalcpu)

      - name: Build iOS
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: |
          scons platform=ios arch=arm64 target=template_debug build_tests=0 -j$(sysctl -n hw.logicalcpu)
          scons platform=ios arch=arm64 target=template_release build_tests=0 -j$(sysctl -n hw.logicalcpu)

      - name: Copy iOS static libraries
        run: |
          BIN=audio_resonance_tool/addons/nexus_resonance/bin/ios
          cp src/lib/godot-cpp/bin/libgodot-cpp.ios.template_debug.arm64.a "$BIN/"
          cp src/lib/godot-cpp/bin/libgodot-cpp.ios.template_release.arm64.a "$BIN/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-macos-ios
          path: audio_resonance_tool/addons/nexus_resonance/bin/

  create-release:
    name: Create Release
    needs: [build-linux-android, build-windows, build-macos-ios]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release addon
        run: |
          mkdir -p release_addon/addons/nexus_resonance/bin
          cp -r audio_resonance_tool/addons/nexus_resonance/* release_addon/addons/nexus_resonance/
          cp -r artifacts/bin-linux-android/* release_addon/addons/nexus_resonance/bin/
          cp -r artifacts/bin-windows/* release_addon/addons/nexus_resonance/bin/
          cp -r artifacts/bin-macos-ios/* release_addon/addons/nexus_resonance/bin/
          cp LICENSE release_addon/addons/nexus_resonance/

      - name: Verify build outputs
        run: |
          echo "=== Release addon contents ==="
          find release_addon -type f | sort
          echo ""
          for f in \
            release_addon/addons/nexus_resonance/bin/windows/nexus_resonance.dll \
            release_addon/addons/nexus_resonance/bin/linux/libnexus_resonance.so \
            release_addon/addons/nexus_resonance/bin/macos/libnexus_resonance.dylib \
          ; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "WARN: $f not found"
            fi
          done

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create addon zip
        run: |
          mkdir -p release_packages
          cd release_addon
          zip -r ../release_packages/nexus_resonance-v${{ steps.version.outputs.version }}.zip addons

      - name: Prepare release body
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CHANGELOG_SECTION=""
          if [ -f ".github/scripts/extract_changelog.py" ]; then
            CHANGELOG_SECTION=$(VERSION="$VERSION" CHANGELOG_PATH="docs/CHANGELOG.md" python3 .github/scripts/extract_changelog.py 2>/dev/null || true)
          fi
          {
            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "$CHANGELOG_SECTION"
              echo ""
            fi
            echo "## Platforms"
            echo ""
            echo "This release includes binaries for all supported platforms:"
            echo "- Windows x86_64 (MSVC)"
            echo "- Linux x86_64"
            echo "- macOS (universal)"
            echo "- Android (arm64, x86_64)"
            echo "- iOS (arm64)"
            echo ""
            echo "## Installation"
            echo ""
            echo "Download **nexus_resonance-v${VERSION}.zip** and extract the \`addons/\` folder into your Godot project root."
            echo ""
            echo "See [README](https://github.com/${{ github.repository }}) for requirements and usage."
          } > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release_body.md
          files: release_packages/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
