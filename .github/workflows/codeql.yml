name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Steam Audio SDK
        run: python3 scripts/install_steam_audio.py

      - name: Create bin directory
        run: mkdir -p audio_resonance_tool/addons/nexus_resonance/bin

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: +security-and-quality

      - name: Build
        run: |
          pip install scons
          scons build_tests=1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
